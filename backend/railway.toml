# Railway 変換ワーカー設定（011_multilang_news/backend をルートにデプロイ）
[build]
builder = "nixpacks"

[deploy]
# PYTHONUTF8=1 は必須。Linuxコンテナの C ロケールだと postgrest/httpx が
# 日本語ペイロードを ascii で encode しようとして UnicodeEncodeError になる。
# 起動コマンドで明示し、env 注入タイミングに依存させない。
#
# LD_LIBRARY_PATH: apt導入のネイティブlib（libuuid/libasound 等）は
# /usr/lib/x86_64-linux-gnu にあるが、Nix版Pythonのローダは既定で
# /usr/lib しか見ず（システムのldconfigキャッシュを使わない）解決に失敗する。
# 既存値を保ったまま当該ディレクトリを先頭に追加して Azure SDK を import 可能にする。
startCommand = "LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH} python -X utf8 -m uvicorn main:app --host 0.0.0.0 --port ${PORT}"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
